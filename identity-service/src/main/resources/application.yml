server:
  port: 8081

spring:
  application:
    name: identity-service
  config:
    import: optional:configserver:${CONFIG_SERVER_URL:http://localhost:8888}
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

eureka:
  client:
    service-url:
      defaultZone: http://eureka:eureka@localhost:8761/eureka/

keycloak:
  server-url: ${KEYCLOAK_URL:http://localhost:8180}
  realm: ecommerce
  client-id: ${KEYCLOAK_CLIENT_ID:ecommerce-client}
  client-secret: ${KEYCLOAK_CLIENT_SECRET:local-dev-ecommerce-secret}
  admin:
    client-id: ${KEYCLOAK_ADMIN_CLIENT_ID:identity-service-admin}
    client-secret: ${KEYCLOAK_ADMIN_CLIENT_SECRET:local-dev-identity-admin-secret}
    realm: ${KEYCLOAK_ADMIN_REALM:ecommerce}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
