spring:
  datasource:
    url: jdbc:postgresql://postgres:5432/flash_sale_db
  data:
    redis:
      host: redis
  kafka:
    bootstrap-servers: kafka:29092

eureka:
  instance:
    hostname: flash-sale-service
  client:
    service-url:
      defaultZone: http://eureka:eureka@discovery-server:8761/eureka/
