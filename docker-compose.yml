services:

  # ============================================================
  # DATABASES
  # ============================================================
  postgres:
    image: postgres:17-alpine
    container_name: ecommerce-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./init-db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - ecommerce-network

  keycloak-db:
    image: postgres:17-alpine
    container_name: ecommerce-keycloak-db
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: ${KEYCLOAK_DB_USER}
      POSTGRES_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
    volumes:
      - keycloak_db_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - ecommerce-network

  # ============================================================
  # CACHE
  # ============================================================
  redis:
    image: redis:8-alpine
    container_name: ecommerce-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - ecommerce-network

  mailpit:
    image: axllent/mailpit:v1.27.8
    container_name: ecommerce-mailpit
    ports:
      - "8025:8025"
    expose:
      - "1025"
    networks:
      - ecommerce-network

  # ============================================================
  # MESSAGE BROKER (Kafka KRaft — no Zookeeper)
  # ============================================================
  kafka:
    image: confluentinc/cp-kafka:8.2.0
    container_name: ecommerce-kafka
    ports:
      - "9092:9092"
    volumes:
      - kafka_data:/var/lib/kafka/data
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_LISTENERS: PLAINTEXT://kafka:29092,CONTROLLER://kafka:29093,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ecommerce-network

  # ============================================================
  # SEARCH ENGINE
  # ============================================================
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.18.8
    container_name: ecommerce-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.ml.enabled=false
      - "ES_JAVA_OPTS=-Xms256m -Xmx256m"
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -qE '\"status\":\"(green|yellow)\"'"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - ecommerce-network

  # ============================================================
  # IDENTITY PROVIDER
  # ============================================================
  keycloak:
    image: quay.io/keycloak/keycloak:26.6.1
    container_name: ecommerce-keycloak
    command: start-dev --import-realm
    depends_on:
      keycloak-db:
        condition: service_healthy
    ports:
      - "8180:8080"
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
      KC_DB_USERNAME: ${KEYCLOAK_DB_USER}
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_HEALTH_ENABLED: "true"
    volumes:
      - ./keycloak:/opt/keycloak/data/import
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - ecommerce-network

  # ============================================================
  # OBSERVABILITY
  # ============================================================
  zipkin:
    image: openzipkin/zipkin:3.5.0
    container_name: ecommerce-zipkin
    ports:
      - "9411:9411"
    networks:
      - ecommerce-network

  prometheus:
    image: prom/prometheus:v3.11.2
    container_name: ecommerce-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - ecommerce-network

  grafana:
    image: grafana/grafana:13.0.1
    container_name: ecommerce-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    networks:
      - ecommerce-network

  # ============================================================
  # SPRING CLOUD INFRASTRUCTURE
  # ============================================================
  discovery-server:
    build:
      context: .
      dockerfile: discovery-server/Dockerfile
    container_name: ecommerce-discovery-server
    ports:
      - "8761:8761"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      EUREKA_USER: ${EUREKA_USER}
      EUREKA_PASSWORD: ${EUREKA_PASSWORD}
    networks:
      - ecommerce-network

  config-server:
    build:
      context: .
      dockerfile: config-server/Dockerfile
    container_name: ecommerce-config-server
    ports:
      - "8888:8888"
    environment:
      SPRING_PROFILES_ACTIVE: native,docker
    depends_on:
      discovery-server:
        condition: service_started
    networks:
      - ecommerce-network

  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    container_name: ecommerce-api-gateway
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      CONFIG_SERVER_URL: http://config-server:8888
      REDIS_HOST: redis
      KEYCLOAK_ISSUER_URI: http://keycloak:8080/realms/ecommerce
      KEYCLOAK_JWK_SET_URI: http://keycloak:8080/realms/ecommerce/protocol/openid-connect/certs
      EUREKA_DEFAULT_ZONE: ${EUREKA_DEFAULT_ZONE}
      EUREKA_INSTANCE_HOSTNAME: api-gateway
    depends_on:
      discovery-server:
        condition: service_started
      config-server:
        condition: service_started
      keycloak:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ecommerce-network

  identity-service:
    build:
      context: .
      dockerfile: identity-service/Dockerfile
    container_name: ecommerce-identity-service
    expose:
      - "8081"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      CONFIG_SERVER_URL: http://config-server:8888
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET}
      KEYCLOAK_ADMIN_CLIENT_ID: ${KEYCLOAK_ADMIN_CLIENT_ID}
      KEYCLOAK_ADMIN_CLIENT_SECRET: ${KEYCLOAK_ADMIN_CLIENT_SECRET}
      EUREKA_DEFAULT_ZONE: ${EUREKA_DEFAULT_ZONE}
      EUREKA_INSTANCE_HOSTNAME: identity-service
    depends_on:
      config-server:
        condition: service_started
      keycloak:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - ecommerce-network

  user-service:
    build:
      context: .
      dockerfile: user-service/Dockerfile
    container_name: ecommerce-user-service
    expose:
      - "8082"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      CONFIG_SERVER_URL: http://config-server:8888
      USER_DB_URL: jdbc:postgresql://postgres:5432/user_db
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      EUREKA_DEFAULT_ZONE: ${EUREKA_DEFAULT_ZONE}
      EUREKA_INSTANCE_HOSTNAME: user-service
    depends_on:
      config-server:
        condition: service_started
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - ecommerce-network

  product-service:
    build:
      context: .
      dockerfile: product-service/Dockerfile
    container_name: ecommerce-product-service
    expose:
      - "8083"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      CONFIG_SERVER_URL: http://config-server:8888
      PRODUCT_DB_URL: jdbc:postgresql://postgres:5432/product_db
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: redis
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      EUREKA_DEFAULT_ZONE: ${EUREKA_DEFAULT_ZONE}
      EUREKA_INSTANCE_HOSTNAME: product-service
    depends_on:
      config-server:
        condition: service_started
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - ecommerce-network

  inventory-service:
    build:
      context: .
      dockerfile: inventory-service/Dockerfile
    container_name: ecommerce-inventory-service
    expose:
      - "8084"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      CONFIG_SERVER_URL: http://config-server:8888
      INVENTORY_DB_URL: jdbc:postgresql://postgres:5432/inventory_db
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      EUREKA_DEFAULT_ZONE: ${EUREKA_DEFAULT_ZONE}
      EUREKA_INSTANCE_HOSTNAME: inventory-service
    depends_on:
      config-server:
        condition: service_started
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - ecommerce-network

  cart-service:
    build:
      context: .
      dockerfile: cart-service/Dockerfile
    container_name: ecommerce-cart-service
    expose:
      - "8085"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      CONFIG_SERVER_URL: http://config-server:8888
      REDIS_HOST: redis
      EUREKA_DEFAULT_ZONE: ${EUREKA_DEFAULT_ZONE}
      EUREKA_INSTANCE_HOSTNAME: cart-service
    depends_on:
      config-server:
        condition: service_started
      redis:
        condition: service_healthy
      product-service:
        condition: service_started
    networks:
      - ecommerce-network

  voucher-service:
    build:
      context: .
      dockerfile: voucher-service/Dockerfile
    container_name: ecommerce-voucher-service
    expose:
      - "8088"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      CONFIG_SERVER_URL: http://config-server:8888
      VOUCHER_DB_URL: jdbc:postgresql://postgres:5432/voucher_db
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      EUREKA_DEFAULT_ZONE: ${EUREKA_DEFAULT_ZONE}
      EUREKA_INSTANCE_HOSTNAME: voucher-service
    depends_on:
      config-server:
        condition: service_started
      postgres:
        condition: service_healthy
    networks:
      - ecommerce-network

  order-service:
    build:
      context: .
      dockerfile: order-service/Dockerfile
    container_name: ecommerce-order-service
    expose:
      - "8086"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      CONFIG_SERVER_URL: http://config-server:8888
      ORDER_DB_URL: jdbc:postgresql://postgres:5432/order_db
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      EUREKA_DEFAULT_ZONE: ${EUREKA_DEFAULT_ZONE}
      EUREKA_INSTANCE_HOSTNAME: order-service
    depends_on:
      config-server:
        condition: service_started
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      product-service:
        condition: service_started
      inventory-service:
        condition: service_started
      cart-service:
        condition: service_started
      voucher-service:
        condition: service_started
    networks:
      - ecommerce-network

  payment-service:
    build:
      context: .
      dockerfile: payment-service/Dockerfile
    container_name: ecommerce-payment-service
    expose:
      - "8087"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      CONFIG_SERVER_URL: http://config-server:8888
      PAYMENT_DB_URL: jdbc:postgresql://postgres:5432/payment_db
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      EUREKA_DEFAULT_ZONE: ${EUREKA_DEFAULT_ZONE}
      EUREKA_INSTANCE_HOSTNAME: payment-service
      VNPAY_TMN_CODE: ${VNPAY_TMN_CODE}
      VNPAY_HASH_SECRET: ${VNPAY_HASH_SECRET}
      VNPAY_PAY_URL: ${VNPAY_PAY_URL}
      VNPAY_RETURN_URL: ${VNPAY_RETURN_URL}
      FRONTEND_ORDER_RESULT_URL: ${FRONTEND_ORDER_RESULT_URL}
    depends_on:
      config-server:
        condition: service_started
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      discovery-server:
        condition: service_started
      order-service:
        condition: service_started
    networks:
      - ecommerce-network

  notification-service:
    build:
      context: .
      dockerfile: notification-service/Dockerfile
    container_name: ecommerce-notification-service
    expose:
      - "8089"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      CONFIG_SERVER_URL: http://config-server:8888
      NOTIFICATION_DB_URL: jdbc:postgresql://postgres:5432/notification_db
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      EUREKA_DEFAULT_ZONE: ${EUREKA_DEFAULT_ZONE}
      EUREKA_INSTANCE_HOSTNAME: notification-service
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USERNAME: ${SMTP_USERNAME}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_AUTH: ${SMTP_AUTH}
      SMTP_STARTTLS: ${SMTP_STARTTLS}
      SMTP_FROM: ${SMTP_FROM:-no-reply@ecommerce.local}
    depends_on:
      config-server:
        condition: service_started
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      discovery-server:
        condition: service_started
      mailpit:
        condition: service_started
    networks:
      - ecommerce-network

  review-service:
    build:
      context: .
      dockerfile: review-service/Dockerfile
    container_name: ecommerce-review-service
    expose:
      - "8090"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      CONFIG_SERVER_URL: http://config-server:8888
      REVIEW_DB_URL: jdbc:postgresql://postgres:5432/review_db
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      EUREKA_DEFAULT_ZONE: ${EUREKA_DEFAULT_ZONE}
      EUREKA_INSTANCE_HOSTNAME: review-service
    depends_on:
      config-server:
        condition: service_started
      postgres:
        condition: service_healthy
      order-service:
        condition: service_started
    networks:
      - ecommerce-network

  search-service:
    build:
      context: .
      dockerfile: search-service/Dockerfile
    container_name: ecommerce-search-service
    expose:
      - "8091"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      CONFIG_SERVER_URL: http://config-server:8888
      ELASTICSEARCH_URIS: http://elasticsearch:9200
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      EUREKA_DEFAULT_ZONE: ${EUREKA_DEFAULT_ZONE}
      EUREKA_INSTANCE_HOSTNAME: search-service
    depends_on:
      config-server:
        condition: service_started
      elasticsearch:
        condition: service_healthy
      kafka:
        condition: service_healthy
      product-service:
        condition: service_started
    networks:
      - ecommerce-network

  content-service:
    build:
      context: .
      dockerfile: content-service/Dockerfile
    container_name: ecommerce-content-service
    expose:
      - "8092"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      CONFIG_SERVER_URL: http://config-server:8888
      CONTENT_DB_URL: jdbc:postgresql://postgres:5432/content_db
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      EUREKA_DEFAULT_ZONE: ${EUREKA_DEFAULT_ZONE}
      EUREKA_INSTANCE_HOSTNAME: content-service
    depends_on:
      config-server:
        condition: service_started
      postgres:
        condition: service_healthy
    networks:
      - ecommerce-network

  flash-sale-service:
    build:
      context: .
      dockerfile: flash-sale-service/Dockerfile
    container_name: ecommerce-flash-sale-service
    expose:
      - "8093"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      CONFIG_SERVER_URL: http://config-server:8888
      FLASH_SALE_DB_URL: jdbc:postgresql://postgres:5432/flash_sale_db
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: redis
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      EUREKA_DEFAULT_ZONE: ${EUREKA_DEFAULT_ZONE}
      EUREKA_INSTANCE_HOSTNAME: flash-sale-service
    depends_on:
      config-server:
        condition: service_started
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      order-service:
        condition: service_started
    networks:
      - ecommerce-network

# ============================================================
# NETWORKS & VOLUMES
# ============================================================
networks:
  ecommerce-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  kafka_data:
  elasticsearch_data:
  keycloak_db_data:
  grafana_data:
