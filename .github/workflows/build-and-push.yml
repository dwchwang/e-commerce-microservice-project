name: Build & Push Images

on:
  push:
    branches: [main]
    paths:
      - '**/pom.xml'
      - '**/src/**'
      - '**/Dockerfile.prod'
      - '.github/workflows/build-and-push.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ${{ github.repository_owner }}

jobs:
  build-maven:
    runs-on: ubuntu-latest
    outputs:
      sha-short: ${{ steps.meta.outputs.sha-short }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Build all services
        run: mvn -B -T 1C clean package -DskipTests

      - name: Compute short SHA
        id: meta
        run: echo "sha-short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Upload JAR artifacts
        uses: actions/upload-artifact@v4
        with:
          name: service-jars
          path: |
            api-gateway/target/*.jar
            discovery-server/target/*.jar
            config-server/target/*.jar
            identity-service/target/*.jar
            user-service/target/*.jar
            product-service/target/*.jar
            inventory-service/target/*.jar
            cart-service/target/*.jar
            voucher-service/target/*.jar
            order-service/target/*.jar
            payment-service/target/*.jar
            notification-service/target/*.jar
            review-service/target/*.jar
            search-service/target/*.jar
            content-service/target/*.jar
            flash-sale-service/target/*.jar
          retention-days: 1

  build-images:
    needs: build-maven
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        service:
          - api-gateway
          - discovery-server
          - config-server
          - identity-service
          - user-service
          - product-service
          - inventory-service
          - cart-service
          - voucher-service
          - order-service
          - payment-service
          - notification-service
          - review-service
          - search-service
          - content-service
          - flash-sale-service
    steps:
      - uses: actions/checkout@v4

      - name: Download JAR artifacts
        uses: actions/download-artifact@v4
        with:
          name: service-jars
          path: .

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.service }}
          tags: |
            type=sha,prefix=,format=short
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & Push
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.service }}
          file: ./${{ matrix.service }}/Dockerfile.prod
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
